<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebFly - AI 网页助手</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="app">
    <!-- 头部 -->
    <header class="header">
      <div class="header-left">
        <button id="copy-link-btn" class="icon-btn" title="复制标题和链接">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 0 0 7.07 0l3.54-3.54a5 5 0 0 0-7.07-7.07L11 4"></path>
            <path d="M14 11a5 5 0 0 0-7.07 0L3.39 14.54a5 5 0 1 0 7.07 7.07L13 20"></path>
          </svg>
        </button>
        <button id="copy-markdown-link-btn" class="icon-btn" title="复制 Markdown 链接">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 0 0 7.07 0l2.12-2.12a5 5 0 0 0-7.07-7.07L10 6"></path>
            <path d="M14 11a5 5 0 0 0-7.07 0l-2.12 2.12a5 5 0 0 0 7.07 7.07L14 18"></path>
            <path d="M8 4H4v4"></path>
            <path d="M16 20h4v-4"></path>
          </svg>
        </button>
      </div>
      <div class="header-right">
        <button id="copy-page-btn" class="icon-btn" title="复制页面内容">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
        <button id="download-icon-btn" class="icon-btn" title="下载当前标签页图标">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 3v12"></path>
            <path d="M7 10l5 5 5-5"></path>
            <path d="M5 21h14"></path>
          </svg>
        </button>
        <button id="clear-chat-btn" class="icon-btn" title="清空对话">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3,6 5,6 21,6"></polyline>
            <path
              d="M19,6 L19,20 C19,21.1 18.1,22 17,22 L7,22 C5.9,22 5,21.1 5,20 L5,6 M8,6 L8,4 C8,2.9 8.9,2 10,2 L14,2 C15.1,2 16,2.9 16,4 L16,6">
            </path>
          </svg>
        </button>
        <button id="settings-btn" class="icon-btn" title="设置">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
        </button>
      </div>
    </header>

    <!-- 聊天消息区域 -->
    <div id="messages" class="messages">
      <div class="welcome-message">
        <!-- 欢迎内容可动态填充或保持空，视设计而定 -->
      </div>
    </div>

    <!-- 悬浮底部区域 -->
    <div class="floating-footer">
      <!-- 页面上下文卡片 -->
      <div id="page-context-card" class="page-context-card">
        <div class="page-context-left">
          <div class="page-context-icon">
            <!-- 默认图标或Favicon -->
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
              <polyline points="13 2 13 9 20 9"></polyline>
            </svg>
          </div>
          <div class="page-context-info">
            <div class="page-title" id="page-title">加载中...</div>
            <div class="page-url" id="page-url">...</div>
          </div>
        </div>
        <button id="close-context-btn" class="close-context-btn" title="隐藏上下文">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>

      <!-- 输入卡片 -->
      <div class="input-card">
        <textarea id="user-input" placeholder="您想要做什么?" rows="1"></textarea>

        <div class="input-toolbar">
          <button id="send-btn" class="send-btn-square" title="发送">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>

        <!-- 快捷操作栏 -->
        <div class="quick-actions-container" id="quick-actions-container">
          <!-- 动态生成 -->
        </div>
      </div>
    </div>

  </div>

  <!-- 设置面板 (保持原样结构，样式可能会微调但结构通用) -->
  <div id="settings-panel" class="settings-panel hidden">
    <!-- ... 保持原有结构 ... -->
    <div class="settings-header">
      <button id="back-btn" class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
      </button>
      <h2>设置</h2>
    </div>

    <div class="settings-content">
      <div class="settings-tabs">
        <button class="tab-btn active" data-tab="providers">模型提供商</button>
        <button class="tab-btn" data-tab="prompts">快捷操作</button>
        <button class="tab-btn" data-tab="about">关于</button>
      </div>

      <div id="tab-providers" class="tab-content active">
        <div class="section">
          <div id="providers-list" class="providers-list">
            <!-- 动态生成 -->
          </div>
          <button id="add-provider-btn" class="add-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            添加提供商
          </button>
        </div>
      </div>

      <div id="tab-prompts" class="tab-content">
        <div class="section">
          <button id="add-prompt-btn" class="add-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            创建快捷操作
          </button>
          <div id="prompts-list" class="prompts-list">
            <!-- 动态生成 -->
          </div>
        </div>
      </div>

      <div id="tab-about" class="tab-content">
        <div class="section">
          <div class="about-info">
            <img class="about-logo" src="../icons/icon128.png" alt="WebFly" />
            <h3>WebFly</h3>
            <p class="version">版本 1.0.0</p>
            <p class="description">通过 AI 模型智能处理网页内容</p>
            <div class="about-links">
              <a href="https://github.com" target="_blank">GitHub</a>
              <span class="divider">·</span>
              <a href="#" id="privacy-link">隐私政策</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 模态框 (保持原有结构，仅确保 ID 对应) -->
  <div id="provider-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="provider-modal-title">添加模型提供商</h3>
        <button class="modal-close" id="close-provider-modal">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>提供商类型</label>
          <select id="provider-type">
            <option value="openai">OpenAI</option>
            <option value="gemini">Gemini (Google)</option>
            <option value="deepseek">DeepSeek</option>
            <option value="qwen">通义千问 (Qwen)</option>
            <option value="openrouter">OpenRouter</option>
            <option value="custom">自定义</option>
          </select>
        </div>
        <div class="form-group" id="custom-name-group" style="display:none;">
          <label>自定义名称</label>
          <input type="text" id="provider-custom-name" placeholder="例如：My API">
        </div>
        <div class="form-group" id="custom-url-group" style="display:none;">
          <label>API Base URL</label>
          <input type="text" id="provider-base-url" placeholder="https://api.example.com/v1">
        </div>
        <div class="form-group">
          <label>API Key</label>
          <input type="password" id="provider-api-key" placeholder="sk-...">
        </div>
        <div class="form-group">
          <label>默认模型</label>
          <input type="text" id="provider-model" placeholder="gpt-4o-mini">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancel-provider">取消</button>
        <button class="btn-primary" id="save-provider">保存</button>
      </div>
    </div>
  </div>

  <div id="prompt-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="prompt-modal-title">创建快捷操作</h3>
        <button class="modal-close" id="close-prompt-modal">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>名称</label>
          <input type="text" id="prompt-name" placeholder="例如：总结">
        </div>
        <div class="form-group">
          <label>Prompt 内容</label>
          <textarea id="prompt-content" rows="6"
            placeholder="请总结以下网页内容...&#10;&#10;使用 {{content}} 插入网页内容&#10;使用 {{selection}} 插入选中文本"></textarea>
          <p class="form-hint">可用变量：<code>{{content}}</code> 网页内容，<code>{{selection}}</code> 选中文本，<code>{{title}}</code>
            页面标题，<code>{{url}}</code> 页面URL</p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancel-prompt">取消</button>
        <button class="btn-danger" id="delete-prompt" style="display:none;">删除</button>
        <button class="btn-primary" id="save-prompt">保存</button>
      </div>
    </div>
  </div>

  <script src="lib/marked.min.js"></script>
  <script src="lib/mermaid.min.js"></script>
  <script src="lib/markdown.js"></script>
  <script src="lib/storage.js"></script>
  <script src="lib/api.js"></script>
  <script src="components/chat.js"></script>
  <script src="components/quick-actions.js"></script>
  <script src="app.js"></script>
</body>

</html>
